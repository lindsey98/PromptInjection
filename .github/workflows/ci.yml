name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lint/test tooling
        run: pip install pytest ruff

      - name: Byte-compile sources
        run: |
          python -m compileall -q \
            config.py attacks.py train_unified.py \
            testing modeling training data_generation gcg tests

      - name: Ruff (non-blocking)
        run: ruff check . || true

      - name: Unit tests
        run: pytest
